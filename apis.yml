name: NASA Earthdata
description: NASA Earthdata is the Earth Observing System Data and Information System (EOSDIS) portal providing access to NASA's Earth observation data holdings. It offers REST APIs for searching, discovering, and downloading satellite imagery, climate data, and Earth science datasets from NASA missions including the Common Metadata Repository, Harmony data transformation services, Global Imagery Browse Services, and the Application for Extracting and Exploring Analysis Ready Samples.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/nasa-earthdata/refs/heads/main/apis.yml
version: '0.19'
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Earth Observation
  - Satellite Data
  - Climate Data
  - Remote Sensing
  - Geospatial
  - NASA
  - Science Data
apis:
  - name: CMR Search API
    description: The Common Metadata Repository (CMR) Search API provides high-performance access to NASA's spatial and temporal metadata registry, cataloging hundreds of millions of metadata records describing NASA's Earth-facing satellite data and data from select US and international agencies. Supports keyword, spatial, temporal, and faceted searches across collections and granules.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.earthdata.nasa.gov/engage/open-data-services-software/earthdata-developer-portal/cmr-api
    baseURL: https://cmr.earthdata.nasa.gov
    tags:
      - Metadata
      - Collections
      - Granules
      - Search
      - Earth Science
    properties:
      - type: Documentation
        url: https://cmr.earthdata.nasa.gov/search/site/docs/search/api.html
      - type: OpenAPI
        url: https://cmr.earthdata.nasa.gov/search/site/search_api_docs.html
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

  - name: CMR STAC API
    description: The CMR SpatioTemporal Asset Catalog (STAC) API provides a STAC-compliant interface over NASA's Common Metadata Repository, enabling discovery and access to Earth science data collections and items using the widely-adopted STAC specification. Supports provider-specific STAC catalogs for individual NASA DAACs.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.earthdata.nasa.gov/engage/open-data-services-software/earthdata-developer-portal/cmr-api
    baseURL: https://cmr.earthdata.nasa.gov/stac
    tags:
      - STAC
      - SpatioTemporal
      - Collections
      - Items
      - Geospatial
    properties:
      - type: Documentation
        url: https://github.com/nasa/cmr-stac/blob/master/docs/usage/usage.md
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

  - name: Earthdata Login API
    description: The Earthdata Login API provides free and immediate access to thousands of EOSDIS data products covering all Earth science disciplines. It manages user authentication and profile management using OAuth2 and Single Sign-On (SSO), enabling applications to query user information and manage access tokens without maintaining separate user databases.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.earthdata.nasa.gov/engage/open-data-services-software/earthdata-developer-portal/earthdata-login-api
    baseURL: https://urs.earthdata.nasa.gov
    tags:
      - Authentication
      - OAuth2
      - SSO
      - User Management
      - Access Control
    properties:
      - type: Documentation
        url: https://www.earthdata.nasa.gov/engage/open-data-services-software/earthdata-developer-portal/earthdata-login-api
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

  - name: AppEEARS API
    description: The Application for Extracting and Exploring Analysis Ready Samples (AppEEARS) API offers a RESTful interface for submitting and managing area or point-based data extraction tasks from NASA Earth science datasets. Supports multiple output formats including GeoTIFF, NetCDF4, and ENVI, with asynchronous job processing and direct cloud-based S3 data access.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://appeears.earthdatacloud.nasa.gov/api/
    baseURL: https://appeears.earthdatacloud.nasa.gov/api
    tags:
      - Data Extraction
      - Analysis Ready
      - GeoTIFF
      - NetCDF
      - Time Series
    properties:
      - type: Documentation
        url: https://appeears.earthdatacloud.nasa.gov/api/
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

  - name: Harmony API
    description: The Harmony API provides data transformation and access services for NASA Earth science data, conforming to OGC Coverages and EDR API standards. Enables subsetting, reprojection, and format conversion of Earth observation data with asynchronous job processing and AWS S3 cloud-native data staging. Supports WMS, OGC Coverages, and OGC EDR access patterns.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://harmony.earthdata.nasa.gov/docs
    baseURL: https://harmony.earthdata.nasa.gov
    tags:
      - Data Transformation
      - Subsetting
      - Reprojection
      - Cloud Data
      - OGC
    properties:
      - type: Documentation
        url: https://harmony.earthdata.nasa.gov/docs
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/nasa-earthdata/refs/heads/main/openapi/harmony-api-openapi.json
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

  - name: Global Imagery Browse Services (GIBS) API
    description: The Global Imagery Browse Services (GIBS) API delivers quick access to over 1,000 satellite imagery products through standards-compliant web services including WMTS, WMS, and Tiled Web Map Service (TWMS). Provides full-resolution global imagery with most datasets updated daily within hours of satellite observation. Supports multiple map projections and quality tiers with no authentication required for public imagery.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.earthdata.nasa.gov/engage/open-data-services-software/earthdata-developer-portal/gibs-api
    baseURL: https://gibs.earthdata.nasa.gov
    tags:
      - Imagery
      - WMTS
      - WMS
      - Tiles
      - Visualization
      - Satellite Imagery
    properties:
      - type: Documentation
        url: https://nasa-gibs.github.io/gibs-api-docs/access-basics/
    contact:
      - FN: NASA Earthdata
        url: https://www.earthdata.nasa.gov/contact
        email: support@earthdata.nasa.gov

